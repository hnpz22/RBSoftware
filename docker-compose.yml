services:
  mysql:
    image: mysql:8.0
    container_name: rbsoftware-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rbsoftware
      MYSQL_USER: rbsoftware
      MYSQL_PASSWORD: rbsoftware
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data_prod:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: rbsoftware-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: infra/.env
    volumes:
      - minio_data_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: rbsoftware-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - minio

  frontend:
    build:
      context: ./frontend
    container_name: rbsoftware-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mysql_data_prod:
    external: true
    name: rbsoftware_rbsoftware_mysql_data
  minio_data_prod:
    external: true
    name: rbsoftware_rbsoftware_minio_data
