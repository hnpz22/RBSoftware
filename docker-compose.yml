# ──────────────────────────────────────────────────────────────────────────
# Compose CANÓNICO de PROD del LMS (rbsoftware).
#
# Deploy (desde /opt/robotschool/RBSoftware):
#     docker compose up -d --build
#     docker exec robotschool_nginx nginx -s reload   # tras recrear el backend
#
# La BD del LMS vive en su MySQL DEDICADO, sobre el volumen EXTERNAL
# `rbsoftware_rbsoftware_mysql_data` (nombre fijo abajo → nunca crea uno vacío
# nuevo, aunque cambie el project name). NO usar el MySQL consolidado.
#
# Secretos en infra/.env, backend/.env y frontend/.env.local (gitignored).
# NUNCA poner credenciales en este archivo.
#
# Un solo compose: no crear `compose.lms.yml` ni variantes paralelas — la
# ambigüedad de dos composes fue la causa raíz del split-brain (06-jun-2026).
# ──────────────────────────────────────────────────────────────────────────
services:
  mysql:
    image: mysql:8.0
    container_name: rbsoftware-mysql
    hostname: rbsoftware-mysql
    restart: unless-stopped
    env_file: infra/.env
    volumes:
      - rbsoftware_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 60s
      timeout: 5s
      retries: 10
    networks:
      robotschool:
        aliases: [rbsoftware-mysql]

  # ⚠️ MinIO DEDICADO — en revisión. Decisión de infra (Nicolás): el LMS NO debe
  # tener MinIO propio; es un bucket dentro del CONSOLIDADO (robotschool_minio).
  # El backend ya apunta al consolidado (MINIO_ENDPOINT=minio-rbs:9000) y sus
  # datos fueron espejados allí (09-jun-2026). Este contenedor queda sin uso por
  # el LMS; pendiente repurposarlo como MinIO de BACKUP o retirarlo (lado Nico).
  # Nota: al ser service `minio`, Compose le añade el alias de red `minio`, que
  # colisiona con el del consolidado → round-robin. Por eso el backend usa
  # `minio-rbs`, no `minio`.
  minio:
    image: minio/minio:latest
    container_name: rbsoftware-minio
    hostname: rbsoftware-minio
    restart: unless-stopped
    env_file: infra/.env
    command: server /data --console-address ":9001"
    volumes:
      - rbsoftware_minio_data:/data
    networks:
      robotschool:
        aliases: [rbsoftware-minio]

  backend:
    build:
      context: ./backend
    container_name: rbsoftware-backend
    hostname: rbsoftware-backend
    restart: unless-stopped
    # 1g (no 512m): el upload del repositorio lee el archivo entero en RAM
    # (await file.read()). PDFs de ~270 MB en un solo buffer ahogan 512 MB.
    mem_limit: 1g
    cpus: 1.0
    env_file:
      - ./backend/.env
    environment:
      # El LMS usa el MinIO CONSOLIDADO (robotschool_minio) via su alias UNICO
      # `minio-rbs`. NO usar `minio:9000`: ese alias lo registran DOS contenedores
      # (consolidado + el dedicado de abajo) en la misma red, asi que hace
      # round-robin y parte los multipart uploads -> NoSuchUpload / 500 en
      # archivos grandes. `minio-rbs` resuelve solo al consolidado y no lleva
      # guion bajo (Host valido para la firma SigV4 de las URLs prefirmadas).
      # Override explicito sobre backend/.env. Ver daily Tomas 2026-06-09.
      - MINIO_ENDPOINT=minio-rbs:9000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      robotschool:
        aliases: [rbsoftware-backend]

  frontend:
    build:
      context: ./frontend
    container_name: rbsoftware-frontend
    hostname: rbsoftware-frontend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      robotschool:
        aliases: [rbsoftware-frontend]

volumes:
  rbsoftware_mysql_data:
    external: true
    name: rbsoftware_rbsoftware_mysql_data
  rbsoftware_minio_data:
    external: true
    name: rbsoftware_rbsoftware_minio_data

networks:
  robotschool:
    external: true
    name: robotschool-inventory_robotschool
